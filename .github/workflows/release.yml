name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: dbview
  GO_VERSION: 1.25.7

jobs:
  build-linux-manylinux2014:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Linux release in manylinux2014
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          docker run --rm \
            -e APP_NAME="${APP_NAME}" \
            -e GO_VERSION="${GO_VERSION}" \
            -e VERSION="${VERSION}" \
            -v "${PWD}:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc '
              set -euo pipefail
              curl -fsSLo /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
              rm -rf /usr/local/go
              tar -C /usr/local -xzf /tmp/go.tar.gz
              export PATH="/usr/local/go/bin:${PATH}"

              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
                go build -buildvcs=false -trimpath \
                -ldflags="-s -w -X main.version=${VERSION}" \
                -o dist/${APP_NAME}_${VERSION}_linux_amd64 ./cmd/dbview

              mkdir -p dist/package
              package_dir="dist/package/${APP_NAME}_${VERSION}_linux_amd64"
              mkdir -p "${package_dir}"
              cp dist/${APP_NAME}_${VERSION}_linux_amd64 "${package_dir}/${APP_NAME}"
              cp README.md "${package_dir}/"
              tar -C dist/package -czf "dist/${APP_NAME}_${VERSION}_manylinux2014_x86_64.tar.gz" "$(basename "${package_dir}")"
            '

      - name: Upload Linux manylinux2014 artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-manylinux2014
          path: |
            dist/*.tar.gz
            dist/${{ env.APP_NAME }}_*_linux_amd64
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build macOS releases
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/${APP_NAME}_${VERSION}_darwin_amd64 ./cmd/dbview

          mkdir -p dist/package
          package_dir="dist/package/${APP_NAME}_${VERSION}_darwin_amd64"
          mkdir -p "${package_dir}"
          cp dist/${APP_NAME}_${VERSION}_darwin_amd64 "${package_dir}/${APP_NAME}"
          cp README.md "${package_dir}/"
          tar -C dist/package -czf "dist/${APP_NAME}_${VERSION}_darwin_amd64.tar.gz" "$(basename "${package_dir}")"

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/${APP_NAME}_${VERSION}_darwin_arm64 ./cmd/dbview

          package_dir="dist/package/${APP_NAME}_${VERSION}_darwin_arm64"
          mkdir -p "${package_dir}"
          cp dist/${APP_NAME}_${VERSION}_darwin_arm64 "${package_dir}/${APP_NAME}"
          cp README.md "${package_dir}/"
          tar -C dist/package -czf "dist/${APP_NAME}_${VERSION}_darwin_arm64.tar.gz" "$(basename "${package_dir}")"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-darwin
          path: |
            dist/*.tar.gz
            dist/${{ env.APP_NAME }}_*_darwin_amd64
            dist/${{ env.APP_NAME }}_*_darwin_arm64
          if-no-files-found: error

  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Windows release
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/${APP_NAME}_${VERSION}_windows_amd64.exe ./cmd/dbview

          mkdir -p dist/package
          package_dir="dist/package/${APP_NAME}_${VERSION}_windows_amd64"
          mkdir -p "${package_dir}"
          cp dist/${APP_NAME}_${VERSION}_windows_amd64.exe "${package_dir}/${APP_NAME}.exe"
          cp README.md "${package_dir}/"
          (cd dist/package && zip -rq "../${APP_NAME}_${VERSION}_windows_amd64.zip" "$(basename "${package_dir}")")

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            dist/*.zip
            dist/${{ env.APP_NAME }}_*_windows_amd64.exe
          if-no-files-found: error

  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Linux arm64 release
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/${APP_NAME}_${VERSION}_linux_arm64 ./cmd/dbview

          mkdir -p dist/package
          package_dir="dist/package/${APP_NAME}_${VERSION}_linux_arm64"
          mkdir -p "${package_dir}"
          cp dist/${APP_NAME}_${VERSION}_linux_arm64 "${package_dir}/${APP_NAME}"
          cp README.md "${package_dir}/"
          tar -C dist/package -czf "dist/${APP_NAME}_${VERSION}_linux_arm64.tar.gz" "$(basename "${package_dir}")"

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-arm64
          path: |
            dist/*.tar.gz
            dist/${{ env.APP_NAME }}_*_linux_arm64
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-manylinux2014
      - build-macos
      - build-windows
      - build-linux-arm64

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            *.tar.gz \
            *.zip \
            ${APP_NAME}_*_linux_amd64 \
            ${APP_NAME}_*_linux_arm64 \
            ${APP_NAME}_*_darwin_amd64 \
            ${APP_NAME}_*_darwin_arm64 \
            ${APP_NAME}_*_windows_amd64.exe > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ env.APP_NAME }}_*_linux_amd64
            dist/${{ env.APP_NAME }}_*_linux_arm64
            dist/${{ env.APP_NAME }}_*_darwin_amd64
            dist/${{ env.APP_NAME }}_*_darwin_arm64
            dist/${{ env.APP_NAME }}_*_windows_amd64.exe
            dist/checksums.txt
